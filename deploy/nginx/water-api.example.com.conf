# Reverse proxy for the Water System Risk Index API.
# Place at /etc/nginx/sites-available/water-api.example.com.conf and symlink
# into sites-enabled. This is the pre-TLS (port 80) template; running
#   sudo certbot --nginx -d water-api.example.com
# rewrites this file to add the HTTPS (443) server block and an HTTP->HTTPS
# redirect automatically.

server {
    listen 80;
    listen [::]:80;
    server_name water-api.example.com;

    # Small JSON API; no large uploads expected.
    client_max_body_size 4m;
    access_log /var/log/nginx/water-api.access.log;
    error_log  /var/log/nginx/water-api.error.log;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 60;
        proxy_send_timeout 60;
    }
}
